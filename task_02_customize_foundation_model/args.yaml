
# MLflow Config
mlflow_uri: "arn:aws:sagemaker:us-east-1:590184118038:mlflow-tracking-server/genai-mlflow-tracker"
mlflow_experiment_name: "Qwen3-4B-Instruct-fingpt-forecaster-sft"


model_id: "s3://sagemaker-us-east-1-590184118038/models/Qwen_Qwen3-4B-Instruct-2507"       # Hugging Face model id, or S3 location

# sagemaker specific parameters
output_dir: "/opt/ml/model"                       # path to where SageMaker will upload the model 
train_dataset_path: "/opt/ml/input/data/train/"   # path to where FSx saves train dataset
test_dataset_path: "/opt/ml/input/data/test/"     # path to where FSx saves test dataset
# training parameters
max_seq_length: 1500  #512 # 2048
lora_r: 8
lora_alpha: 16
lora_dropout: 0.1                 
learning_rate: 2e-4                    # learning rate scheduler
num_train_epochs: 1                    # number of training epochs
per_device_train_batch_size: 2         # batch size per device during training
per_device_eval_batch_size: 1          # batch size for evaluation
gradient_accumulation_steps: 2         # number of steps before performing a backward/update pass
gradient_checkpointing: true           # use gradient checkpointing
fp16: true
bf16: false                            # use bfloat16 precision
tf32: false                            # use tf32 precision

merge_weights: true                    # merge weights in the base model
